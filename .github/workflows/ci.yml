name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "examples/**"
      - "tests/**"
      - "sphinxsim/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "*.cmake"
      - "pyproject.toml"
  pull_request:
    branches: [main, master]
    paths:
      - "examples/**"
      - "tests/**"
      - "sphinxsim/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
      - "*.cmake"
      - "pyproject.toml"
  workflow_dispatch:

env:
  VCPKG_VERSION: "2024.11.16"

jobs:
  build-and-test-linux:
    name: build-and-test (linux)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux
      SPHINXSIM_LLM_PROVIDER: mock
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            build-essential \
            curl zip unzip tar \
            pkg-config \
            git \
            ninja-build \
            autoconf automake autoconf-archive \
            libxmu-dev libxi-dev libgl-dev libxt-dev \
            libvtk9-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Set up vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: ${{ env.VCPKG_VERSION }}
          cache-version: ${{ env.VCPKG_VERSION }}

      - name: Install C++ dependencies via vcpkg
        run: |
          # openblas with dynamic-arch avoids -march=native conflicts with ccache
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            openblas[dynamic-arch] --allow-unsupported
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            eigen3 \
            tbb \
            boost-program-options \
            boost-geometry \
            simbody \
            spdlog \
            gtest \
            pybind11 \
            nlohmann-json

      - name: Configure CMake (integrated build)
        run: |
          cmake --preset integrated-build-release \
            -D CMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D Python3_EXECUTABLE=$(which python3)

      - name: Build
        run: |
          cmake --build --preset integrated-build-release \
            --parallel $(nproc)

      - name: Run C++ simulation class tests (ctest)
        run: |
          ctest --test-dir ${{ github.workspace }}/build-integrated \
            --output-on-failure \
            -R "test_(2d|3d)_simulation$"

      - name: Install Python package (editable with dev dependencies)
        run: |
          export CMAKE_ARGS="-D CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          pip install -e ".[dev]"

      - name: Run unit tests (tests/)
        run: |
          pytest tests/ -v

      - name: Run example tests (examples/)
        run: |
          pytest examples/ -v

  build-and-test-windows:
    name: build-and-test (windows)
    runs-on: windows-2022
    permissions:
      contents: read
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      SPHINXSIM_LLM_PROVIDER: mock
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Install Windows build tools
        shell: pwsh
        run: |
          choco install ccache -y --no-progress
          choco install ninja -y --no-progress
          $chocoBin = Join-Path $env:ChocolateyInstall 'bin'
          $chocoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $chocoBin 'ccache.exe') --version
          & (Join-Path $chocoBin 'ninja.exe') --version

      - name: Set up vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: ${{ env.VCPKG_VERSION }}
          cache-version: ${{ env.VCPKG_VERSION }}-windows

      - name: Install C++ dependencies via vcpkg (Windows)
        shell: pwsh
        run: |
          $vcpkg = "${{ github.workspace }}\\vcpkg\\vcpkg.exe"
          & $vcpkg install --clean-after-build openblas[dynamic-arch] --allow-unsupported
          & $vcpkg install --clean-after-build `
            eigen3 `
            tbb `
            boost-program-options `
            boost-geometry `
            simbody `
            spdlog `
            gtest `
            pybind11 `
            vtk `
            nlohmann-json

      - name: Set up MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Windows)
        shell: pwsh
        run: |
          $pythonExe = python -c 'import sys; print(sys.executable)'
          $ccacheExe = Join-Path $env:ChocolateyInstall 'bin\ccache.exe'
          cmake --preset integrated-build-release-windows `
            -D CMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -D CMAKE_C_COMPILER_LAUNCHER="$ccacheExe" `
            -D CMAKE_CXX_COMPILER_LAUNCHER="$ccacheExe" `
            -D Python3_EXECUTABLE="$pythonExe"

      - name: Build (Windows)
        shell: pwsh
        run: |
          cmake --build --preset integrated-build-release-windows --parallel

      - name: Run C++ simulation class tests (Windows)
        shell: pwsh
        run: |
          ctest --test-dir "${{ github.workspace }}\\build-integrated" `
            --output-on-failure `
            -R "test_(2d|3d)_simulation$"

      - name: Install Python package (editable with dev dependencies)
        shell: pwsh
        run: |
          $toolchain = "${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -replace '\\', '/'
          $env:CMAKE_ARGS = "-D CMAKE_TOOLCHAIN_FILE=$toolchain"
          pip install -e ".[dev]"

      - name: Run unit tests (tests/, CI mock-LLM-only)
        env:
          SPHINXSIM_LLM_PROVIDER: mock
        run: |
          pytest tests/ -v -k "not ollama"

      - name: Run example tests (examples/)
        run: |
          pytest examples/ -v

  build-and-test-macos:
    name: build-and-test (macos)
    runs-on: macos-15-intel
    permissions:
      contents: read
    env:
      VCPKG_DEFAULT_TRIPLET: x64-osx
      SPHINXSIM_LLM_PROVIDER: mock
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Install macOS system dependencies
        run: |
          brew update
          brew install ninja autoconf automake autoconf-archive pkg-config vtk

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Set up vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: ${{ env.VCPKG_VERSION }}
          cache-version: ${{ env.VCPKG_VERSION }}-macos

      - name: Install C++ dependencies via vcpkg (macOS)
        run: |
          # openblas with dynamic-arch avoids -march=native conflicts with ccache
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            openblas[dynamic-arch] --allow-unsupported
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            eigen3 \
            tbb \
            boost-program-options \
            boost-geometry \
            simbody \
            spdlog \
            gtest \
            pybind11 \
            nlohmann-json

      - name: Configure CMake (macOS)
        run: |
          cmake --preset integrated-build-release \
            -D CMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D Python3_EXECUTABLE=$(which python3)

      - name: Build (macOS)
        run: |
          cmake --build --preset integrated-build-release --parallel "$(sysctl -n hw.logicalcpu)"

      - name: Run C++ simulation class tests (macOS)
        run: |
          ctest --test-dir ${{ github.workspace }}/build-integrated \
            --output-on-failure \
            -R "test_(2d|3d)_simulation$"

      - name: Install Python package (editable with dev dependencies)
        run: |
          export CMAKE_ARGS="-D CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          pip install -e ".[dev]"

      - name: Run unit tests (tests/, CI mock-LLM-only)
        env:
          SPHINXSIM_LLM_PROVIDER: mock
        run: |
          pytest tests/ -v -k "not ollama"

      - name: Run example tests (examples/)
        run: |
          pytest examples/ -v

  wheel-smoke:
    name: wheel-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            vcpkg_triplet: x64-linux
          - os: windows-2022
            vcpkg_triplet: x64-windows
          - os: macos-15-intel
            vcpkg_triplet: x64-osx
    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
      SPHINXSIM_LLM_PROVIDER: mock
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            build-essential \
            curl zip unzip tar \
            pkg-config \
            git \
            ninja-build \
            autoconf automake autoconf-archive \
            libxmu-dev libxi-dev libgl-dev libxt-dev \
            libvtk9-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja autoconf automake autoconf-archive pkg-config vtk

      - name: Install Windows build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja -y --no-progress
          $chocoBin = Join-Path $env:ChocolateyInstall 'bin'
          $chocoBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $chocoBin 'ninja.exe') --version

      - name: Set up vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: ${{ env.VCPKG_VERSION }}
          cache-version: ${{ env.VCPKG_VERSION }}-${{ runner.os }}-wheel

      - name: Install C++ dependencies via vcpkg (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            openblas[dynamic-arch] --allow-unsupported
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            eigen3 \
            tbb \
            boost-program-options \
            boost-geometry \
            simbody \
            spdlog \
            gtest \
            pybind11 \
            nlohmann-json

      - name: Install C++ dependencies via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkg = "${{ github.workspace }}\vcpkg\vcpkg.exe"
          & $vcpkg install --clean-after-build openblas[dynamic-arch] --allow-unsupported
          & $vcpkg install --clean-after-build `
            eigen3 `
            tbb `
            boost-program-options `
            boost-geometry `
            simbody `
            spdlog `
            gtest `
            pybind11 `
            vtk `
            nlohmann-json

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheel with pip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export CMAKE_ARGS="-D CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
          python -m pip wheel . -w dist

      - name: Build wheel with pip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $toolchain = "${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" -replace '\\', '/'
          $env:CMAKE_ARGS = "-D CMAKE_TOOLCHAIN_FILE=$toolchain -D CMAKE_C_COMPILER=cl -D CMAKE_CXX_COMPILER=cl"
          python -m pip wheel . -w dist

      - name: Install built wheel (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Install built wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem "dist\*.whl" | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel file found in dist/"
          }
          python -m pip install --force-reinstall $wheel.FullName

      - name: Smoke test wheel import and CLI
        run: |
          python -c "import os,tempfile; d=tempfile.mkdtemp(); os.chdir(d); from sphinxsim.bindings.loader import load_sphinxsys_core; m=load_sphinxsys_core(); print('Loaded extension:', m.__name__)"
          sphinxsim --help
